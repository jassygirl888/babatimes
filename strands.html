<!DOCTYPE html>
<html>
<head>
  <title>Strands</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Franklin Gothic Medium","Franklin Gothic",sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fafafa;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-family: "Roboto Slab", serif;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .home {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 16px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
    }

    .grid-wrap {
      position: relative;
      display: inline-block;
      margin-top: 10px;
      touch-action: none; /* IMPORTANT for drag */
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 6px;
    }

    .cell {
      width: 50px;
      height: 50px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      font-weight: bold;
      background: white;
      position: relative;
      z-index: 2;
      cursor: pointer;
    }

    .cell.selected {
      background: #ddd;
    }

    .cell.found {
      background: #3d9cba;
      color: white;
    }

    svg {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      pointer-events: none;
    }

    #current {
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">&lt;</button>

<h1>Strands</h1>
<p>WHERE WE STARTED EATING</p>

<div class="grid-wrap" id="wrap">
  <svg id="lines"></svg>
  <div class="grid" id="grid"></div>
</div>

<p id="current"></p>

<button onclick="submitWord()">Submit</button>

<script>

const themeWords = [
  "AMANO",
  "MINANTE",
  "TALESANDFEELINGS",
  "BELLAMADEUS",
  "BURNTBEAN"
];

const spangram = "WHEREWESTARTEDEATING";
const size = 6;

let letters = themeWords.join("").split("").sort(() => Math.random() - 0.5);

let grid = letters.map((letter, i) => ({
  letter,
  row: Math.floor(i / size),
  col: i % size,
  found: false
}));

let selected = [];
let found = [];

const gridEl = document.getElementById("grid");
const svg = document.getElementById("lines");
const wrap = document.getElementById("wrap");

let isDragging = false;

function render() {

  gridEl.innerHTML = "";

  grid.forEach((c, i) => {

    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = c.letter;

    if (selected.includes(i)) div.classList.add("selected");
    if (c.found) div.classList.add("found");

    div.dataset.index = i;

    gridEl.appendChild(div);
  });

  drawLines();
}

function indexFromPoint(x, y) {

  const el = document.elementFromPoint(x, y);
  if (!el || !el.classList.contains("cell")) return null;
  return Number(el.dataset.index);
}

function isAdjacent(a, b) {
  const A = grid[a];
  const B = grid[b];

  return Math.abs(A.row - B.row) <= 1 &&
         Math.abs(A.col - B.col) <= 1;
}

/* =========================
   DRAG START
========================= */
wrap.addEventListener("mousedown", startDrag);
wrap.addEventListener("touchstart", startDrag);

function startDrag(e) {
  isDragging = true;
  selected = [];

  handleMove(e);
}

/* =========================
   DRAG MOVE
========================= */
wrap.addEventListener("mousemove", handleMove);
wrap.addEventListener("touchmove", handleMove);

function handleMove(e) {

  if (!isDragging) return;

  let x = e.touches ? e.touches[0].clientX : e.clientX;
  let y = e.touches ? e.touches[0].clientY : e.clientY;

  const i = indexFromPoint(x, y);
  if (i === null) return;

  if (grid[i].found) return;

  if (selected.includes(i)) return;

  if (selected.length > 0) {
    const last = selected[selected.length - 1];
    if (!isAdjacent(last, i)) return;
  }

  selected.push(i);
  updateCurrent();
  render();
}

/* =========================
   DRAG END
========================= */
window.addEventListener("mouseup", endDrag);
window.addEventListener("touchend", endDrag);

function endDrag() {
  isDragging = false;
}

/* =========================
   CURRENT WORD
========================= */
function updateCurrent() {
  document.getElementById("current").innerText =
    selected.map(i => grid[i].letter).join("");
}

/* =========================
   LINES
========================= */
function drawLines() {

  const cells = document.querySelectorAll(".cell");
  const rect = wrap.getBoundingClientRect();

  svg.setAttribute("width", rect.width);
  svg.setAttribute("height", rect.height);
  svg.innerHTML = "";

  for (let i = 0; i < selected.length - 1; i++) {

    const a = cells[selected[i]].getBoundingClientRect();
    const b = cells[selected[i + 1]].getBoundingClientRect();

    const x1 = a.left - rect.left + 25;
    const y1 = a.top - rect.top + 25;
    const x2 = b.left - rect.left + 25;
    const y2 = b.top - rect.top + 25;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

    line.setAttribute("x1", x1);
    line.setAttribute("y1", y1);
    line.setAttribute("x2", x2);
    line.setAttribute("y2", y2);
    line.setAttribute("stroke", "#666");
    line.setAttribute("stroke-width", "3");
    line.setAttribute("stroke-linecap", "round");

    svg.appendChild(line);
  }
}

/* =========================
   SUBMIT
========================= */
function submitWord() {

  const word = selected.map(i => grid[i].letter).join("");

  if (themeWords.includes(word) && !found.includes(word)) {

    found.push(word);
    selected.forEach(i => grid[i].found = true);
  }

  else if (word === spangram) {

    selected.forEach(i => grid[i].found = true);
  }

  selected = [];
  updateCurrent();
  render();
}

render();

</script>

</body>
</html>
