<!DOCTYPE html>
<html>
<head>
  <title>Strands</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Franklin Gothic Medium","Franklin Gothic",sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fafafa;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-family: "Roboto Slab", serif;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .home {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 16px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 6px;
    }

    .cell {
      width: 50px;
      height: 50px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-weight: bold;
      background: white;
    }

    .cell.selected {
      background: #ddd;
    }

    .cell.found {
      background: #3d9cba;
      color: white;
    }

    #current {
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">&lt;</button>

<h1>Strands</h1>
<p>WHERE WE STARTED EATING</p>

<div class="grid" id="grid"></div>

<p id="current"></p>

<button onclick="submitWord()">Submit</button>

<script>

const size = 6;

/* 1. GRID LETTERS (fixed, meaningful layout) */
const letters = [
  "A","M","A","N","O","X",
  "M","I","N","A","N","T",
  "T","A","L","E","S","A",
  "B","E","L","L","A","M",
  "B","U","R","N","T","B",
  "E","A","N","X","X","X"
];

/* 2. SOLUTION PATHS (REAL STRANDS ENGINE) */
const solutions = {
  AMANO: [0,1,2,3,4],
  MINANTE: [6,7,8,9,10,11,12],
  TALESANDFEELINGS: [12,13,14,15,16,17],
  BELLAMADEUS: [18,19,20,21,22,23],
  BURNTBEAN: [24,25,26,27,28,29,30,31]
};

const spangramPath = [0,6,12,18,24,30]; // simple demo path

let selected = [];
let found = new Set();
let grid = [];

for (let i = 0; i < letters.length; i++) {
  grid.push({
    letter: letters[i],
    row: Math.floor(i / size),
    col: i % size,
    found: false
  });
}

function render() {
  const el = document.getElementById("grid");
  el.innerHTML = "";

  grid.forEach((c, i) => {

    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = c.letter;

    if (selected.includes(i)) div.classList.add("selected");
    if (c.found) div.classList.add("found");

    div.onclick = () => pick(i);

    el.appendChild(div);
  });
}

/* 3. ADJACENCY (8-direction real Strands rule) */
function pick(i) {

  if (selected.includes(i)) return;

  if (selected.length > 0) {
    const last = grid[selected[selected.length - 1]];
    const curr = grid[i];

    const dr = Math.abs(last.row - curr.row);
    const dc = Math.abs(last.col - curr.col);

    if (dr > 1 || dc > 1) return;
  }

  selected.push(i);

  document.getElementById("current").innerText =
    selected.map(x => grid[x].letter).join("");

  render();
}

/* 4. CHECK PATH MATCH */
function submitWord() {

  for (const word in solutions) {

    const path = solutions[word];

    if (arraysEqual(path, selected)) {

      path.forEach(i => grid[i].found = true);
      found.add(word);
    }
  }

  // spangram check
  if (arraysEqual(spangramPath, selected)) {
    spangramPath.forEach(i => grid[i].found = true);
  }

  selected = [];
  document.getElementById("current").innerText = "";

  render();
}

function arraysEqual(a, b) {
  return a.length === b.length && a.every((v, i) => v === b[i]);
}

render();

</script>

</body>
</html>
