<!DOCTYPE html>
<html>
<head>
  <title>Connections 💛</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fafafa;
      flex-direction: column;
      text-align: center;
    }

    .home {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    #game {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    /* ACTIVE GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      width: 420px;
    }

    .tile {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;

      border: 2px solid #ccc;
      border-radius: 12px;
      background: white;
      cursor: pointer;

      font-size: 11px;
      text-align: center;
      line-height: 1.1;

      padding: 6px;
      box-sizing: border-box;

      word-break: break-word;
      overflow-wrap: break-word;
    }

    .tile.selected {
      background: #ddd;
    }

    /* SOLVED SECTION */
    .solved-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .group-title {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #333;
    }

    .solved-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      width: 420px;
    }

    .solved-tile {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      color: white;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    #status {
      font-weight: bold;
      height: 20px;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<h2>Connections</h2>

<div id="game">

  <div id="solved"></div>

  <div class="grid" id="grid"></div>

  <button onclick="submitGroup()">Submit</button>

  <p id="status"></p>

</div>

<script>

const groups = [
  { name: "FIRST DATE ORDERS", words: ["PIZZA","PISTACHIO","MOZZARELLA BALLS","RAVIOLI"] },
  { name: "DATING SPOTS", words: ["AMANO","KODAWARI","MINANTE","TALES AND FEELINGS"] },
  { name: "JUST NOT OUR GOVERNMENT NAMES", words: ["BABA","LOVEY","LANGLING","BABY"] },
  { name: "FIRST TREATS", words: ["FRIES & MCFLURRY","COCO MILKTEA","STARBS","COOKIES"] }
];

const colors = [
  "#f9df6d", // yellow
  "#6aaa64", // green
  "#a0c4ff", // blue
  "#cdb4db"  // purple
];

let allWords = groups.flatMap(g => g.words)
  .sort(() => Math.random() - 0.5);

let selected = [];
let solvedCount = 0;

function renderGrid() {
  document.getElementById("grid").innerHTML =
    allWords.map(w =>
      `<div class="tile" onclick="toggle(this,'${w}')">${w}</div>`
    ).join("");
}

renderGrid();

function toggle(el, word) {
  if (selected.includes(word)) {
    selected = selected.filter(x => x !== word);
    el.classList.remove("selected");
  } else if (selected.length < 4) {
    selected.push(word);
    el.classList.add("selected");
  }
}

function submitGroup() {
  if (selected.length !== 4) return;

  let match = groups.find(g =>
    g.words.every(w => selected.includes(w))
  );

  let almost = groups.find(g => {
    let common = g.words.filter(w => selected.includes(w)).length;
    return common === 3;
  });

  if (match) {

    // remove from active pool
    allWords = allWords.filter(w => !match.words.includes(w));

    // create NYT-style solved block
    let wrapper = document.createElement("div");
    wrapper.className = "solved-group";

    let title = document.createElement("div");
    title.className = "group-title";
    title.innerText = match.name;

    let row = document.createElement("div");
    row.className = "solved-row";

    match.words.forEach(w => {
      let box = document.createElement("div");
      box.className = "solved-tile";
      box.style.background = colors[solvedCount];
      box.innerText = w;
      row.appendChild(box);
    });

    wrapper.appendChild(title);
    wrapper.appendChild(row);

    document.getElementById("solved").appendChild(wrapper);

    solvedCount++;
    renderGrid();

    document.getElementById("status").innerText =
      "Solved 💛 " + match.name;

  } else if (almost) {
    document.getElementById("status").innerText =
      "So close… 1 away 👀";
  } else {
    document.getElementById("status").innerText =
      "Not quite ❌";
  }

  selected = [];
  document.querySelectorAll(".tile").forEach(t =>
    t.classList.remove("selected")
  );
}

</script>

</body>
</html>
