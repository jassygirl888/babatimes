<!DOCTYPE html>
<html>
<head>
  <title>Connections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --border: #ccc;
    }

    body {
      font-family: "Franklin Gothic Medium", "Franklin Gothic", sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
        padding: 0 12px 40px;
      -webkit-tap-highlight-color: transparent;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        position: fixed;
        width: 100%;
      /* margin: 0; */
      /* text-align: center; */
    }

    header {
      width: 100%;
      max-width: 560px;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
    
      padding: 18px 0 12px;
      margin-bottom: 8px;
    
      border-bottom: 1.5px solid #ccc;
    }
    
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: #1a1410;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .back-btn {
      padding: 6px 12px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;
  
      font-size: 13px;
      font-weight: bold;
    
      cursor: pointer;
      font-family: "Franklin Gothic Medium", "Franklin Gothic", sans-serif;
    
      white-space: nowrap;
    }
    
    .back-btn:hover {
      background: #f0f0f0;
    }
    
    .home {
      position: fixed;
      top: 20px;
      bottom: auto;
      left: 20px;
      transform: none;
      /* bottom: 20px; */
      /* left: 50%; */
      /* transform: translateX(-50%); */
      
      padding: 10px 16px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;
    
      font-size: 13px;
      font-weight: bold;
    
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    
      -webkit-tap-highlight-color: transparent;
    }

    .subheader {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 8px 0 5px;
    }


    #game {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      width: min(420px, 92vw);
    }

    .tile {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ccc;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: bold;
      text-align: center;
      line-height: 1.1;
      padding: 6px;
      box-sizing: border-box;
      word-break: break-word;
      overflow-wrap: break-word;
      transition: background 0.15s, border-color 0.15s;

      user-select: none;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .tile.selected {
      background: #ddd;
      border-color: #999;
    }

    #status { 
      font-size: 12px;
      font-weight: bold;
      /* margin: 0; */
      margin-bottom: 5px;
    }
    
    #solved {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: min(420px, 92vw);
    }

    .solved-row {
      width: 100%;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 10px;
      box-sizing: border-box;
      gap: 4px;
      text-align: center;
    }

    .solved-row .group-title {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #1a1a1a
      
    }

    .solved-row .group-words {
      font-size: 12px;
      font-weight: normal;
      align-items: center;
      color: #1a1a1a;
    }

    #mistakes-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #mistakes-label {
      font-size: 13px;
      color: #555;
    }

    #mistakes-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.lost {
      background: #ccc;
      transform: scale(0.85);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      padding: 10px 16px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: #f0f0f0;
    }

    button.primary {
      background: #333;
      color: white;
    }

    button.primary:hover {
      background: #555;
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

   .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,250,250,0.97);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
  }
  
  .win-overlay.show {
    display: flex;
  }
  
  .win-emoji {
    font-size: 52px;
    margin-bottom: 14px;
  }
  
  .win-title {
    font-family: "Franklin Gothic Medium", "Franklin Gothic", sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #1a1410;
    margin-bottom: 8px;
  }
  
  .win-sub {
    font-size: 14px;
    color: #555;
    max-width: 300px;
    line-height: 1.6;
    margin-bottom: 22px;
  }
  
  .win-play-again {
    padding: 12px 28px;
    border: none;
    border-radius: 24px;
    background: #333;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  } 
  </style>
</head>

<body>

<header>
  <button class="back-btn" onclick="window.location.href='index.html'">&lt;</button>
  <span class="brand">Connections</span>
  <span></span>
</header>

 <p id="status"></p>
<div id="game">
  <div id="solved"></div>

  <div class="grid" id="grid"></div>

  <div id="mistakes-area">
    <div id="mistakes-label">Mistakes remaining:</div>

    <div id="mistakes-dots">
      <div class="dot" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
    </div>
  </div>

  <div class="btn-row">
    <button onclick="shuffleGrid()">Shuffle</button>
    <button onclick="deselectAll()">Deselect All</button>
    <button class="primary" onclick="submitGroup()">Submit</button>
  </div>
</div>

<script>

const groups = [
    {
    name: "JUST NOT OUR GOVERNMENT NAMES",
    color: "#fadf6e", 
    words: ["BABA","LOVEY","LANGLING","BABY"]
  },
  {
    name: "FIRST DATE ORDERS",
    color: "#a0c45a", 
    words: ["PIZZA","PISTACHIO GELATO","MOZZARELLA BALLS","RAVIOLI"]
  },
  {
    name: "PADUDING TREATS",
    color: "#b3c4f0", 
    words: ["FRIES & MCFLURRY","COCO MILKTEA","VANILLA COLD BREW","HELLA GOOD COOKIES"]
  },
  {
    name: "BABA'S STARBUCKS LINE",
    color: "#ba81c5",
    words: ["ICED BARISTA GRANDE","2 PUMPS WHITE MOCHA","STARS FOR EVERYONE","PWD DISCOUNT"]
  }
];

let allWords = groups
  .flatMap(g => g.words)
  .sort(() => Math.random() - 0.5);

let selected = [];
let solvedCount = 0;
let mistakes = 0;

const MAX_MISTAKES = 4;

function renderGrid() {
  
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  allWords.forEach(word => {

    const tile = document.createElement("div");

    tile.className = "tile";
    tile.innerText = word;

    // restore selected look
    if (selected.includes(word)) {
      tile.classList.add("selected");
    }

    // click selection
    tile.onclick = function () {
      if (admire) return;

      // deselect
      if (selected.includes(word)) {

        selected = selected.filter(w => w !== word);
        tile.classList.remove("selected");
      }

      // select
      else if (selected.length < 4) {

        selected.push(word);
        tile.classList.add("selected");
      }
    };

    grid.appendChild(tile);
  });
}

function deselectAll() {

  selected = [];
  renderGrid();
}

function shuffleGrid() {

  deselectAll();

  allWords = allWords.sort(() => Math.random() - 0.5);

  renderGrid();
}

function updateDots() {

  for (let i = 0; i < MAX_MISTAKES; i++) {

    const dot = document.getElementById("dot-" + (MAX_MISTAKES - 1 - i));

    if (i < mistakes) {
      dot.classList.add("lost");
    } else {
      dot.classList.remove("lost");
    }
  }
}

function submitGroup() {

  if (selected.length !== 4) return;

  const match = groups.find(g =>
    g.words.every(w => selected.includes(w))
  );

  const almost = groups.find(g =>
    g.words.filter(w => selected.includes(w)).length === 3
  );

  // CORRECT
  if (match) {

    allWords = allWords.filter(w => !match.words.includes(w));

    const row = document.createElement("div");

    row.className = "solved-row";
    // row.style.background = colors[solvedCount];
    row.style.background = match.color;
    
    const title = document.createElement("div");
    title.className = "group-title";
    title.innerText = match.name;

    const words = document.createElement("div");
    words.className = "group-words";
    words.innerText = match.words.join(", ");

    row.appendChild(title);
    row.appendChild(words);

    document.getElementById("solved").appendChild(row);

    solvedCount++;

    document.getElementById("status").innerText = "";

    if (solvedCount === groups.length) {
      document.getElementById("status").innerText =
        "You got them all! 🎉";
    
      setTimeout(() => {
        document.getElementById("winOverlay").classList.add("show");
      }, 500);
    }

  }

  // WRONG
  else {

    mistakes++;

    updateDots();

    if (almost) {
      document.getElementById("status").innerText =
        "OH! So close… One away 👀";
    } else {
      document.getElementById("status").innerText =
        "Eh? Nope! ❌";
    }

    if (mistakes >= MAX_MISTAKES) {

      document.getElementById("status").innerText =
        "No more tries! 💔";

      document.querySelector("button.primary").disabled = true;
    }
  }

  selected = [];

  renderGrid();
}

renderGrid();


let admire = false;

function admireMode() {
  admire = true;
  document.getElementById("winOverlay").classList.remove("show");


  // disable interactions
  document.querySelectorAll(".tile").forEach(t => {
    t.style.pointerEvents = "none";
    t.style.opacity = "0.7";
  });
} 

function resetGame() {
  admire = false;
  selected = [];
  solvedCount = 0;
  mistakes = 0;

  allWords = groups
    .flatMap(g => g.words)
    .sort(() => Math.random() - 0.5);

  document.getElementById("solved").innerHTML = "";
  document.getElementById("status").innerText = "";

  document.querySelectorAll(".tile").forEach(t => {
    t.style.pointerEvents = "auto";
    t.style.opacity = "1";
  });

  document.querySelectorAll(".dot").forEach(dot => {
    dot.classList.remove("lost");
  });

  renderGrid();
}
</script>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-emoji">🎉</div>
  <div class="win-title">You solved it!</div>
  <div class="win-sub">Nice one. Clean solve 💫</div>

  <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
    <button class="win-play-again" onclick="admireMode()">Admire Puzzle</button>
    <button class="win-play-again" onclick="resetGame()">Play Again</button>
    <button class="win-play-again" onclick="location.href='index.html'">Home</button>
  </div>
</div>
  
  
</body>
</html>
