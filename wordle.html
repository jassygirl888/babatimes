<!DOCTYPE html>
<html>
<head>
  <title>Wordle</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SAME TITLE FONT STYLE AS BABA TIMES -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>

    body {
      font-family: "Franklin Gothic Medium", "Franklin Gothic", sans-serif;
    
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    
      margin: 0;
      background: #fafafa;
      text-align: center;
    
      -webkit-tap-highlight-color: transparent;
    }

   header {
      width: 100%;
      max-width: 560px;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      padding: 18px 0 12px;
      border-bottom: 1.5px solid #ccc
      margin-bottom: 4px;
    }
    
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: #1a1410;
      letter-spacing: -0.5px;
      text-align: center;
    }
    
    .back-btn {
      padding: 6px 12px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      font-family: "Franklin Gothic Medium", sans-serif;
    } 
   
    .home {
      position: fixed;
      top: 20px;
      bottom: auto;
      left: 20px;
      transform: none;
      /* bottom: 20px; */
      /* left: 50%; */
      /* transform: translateX(-50%); */
      
      padding: 10px 16px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;
    
      font-size: 13px;
      font-weight: bold;
    
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    
      -webkit-tap-highlight-color: transparent;
    }

    .subheader {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 8px 0 5px;
    }

    #board {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .tile {
      /* width: clamp(36px, 9vw, 45px);
      height: clamp(36px, 9vw, 45px); */
      width: clamp(44px, 11vw, 56px);
      height: clamp(44px, 11vw, 56px);

      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;

      font-weight: bold;
      /* font-size: clamp(16px, 4.5vw, 20px); */
      font-size: clamp(18px, 5vw, 24px);
      
      color: #111;
      background: white;
    }

    /* KEYBOARD */
    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .keyrow {
      /* display: flex;
      justify-content: center;
      gap: 6px; */

      display: flex;
      justify-content: center;
      gap: 6px;

      width: 100%;
      max-width: 420px;

      padding: 0 4px;
      box-sizing: border-box;
    }

    .key {
      flex: 1;              /* KEY FIX: auto shrink/grow */
      padding: 12px 0;
    
      border: none;
      background: #ddd;
      cursor: pointer;
      border-radius: 6px;
    
      font-weight: bold;
      font-size: clamp(12px, 3.5vw, 16px);
    
      color: #111;
      min-width: 28px;        /* IMPORTANT for flex shrink */
      -webkit-tap-highlight-color: transparent;
    }

    /* WIN OVERLAY (same system as Strands) */
    .win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(250,250,250,0.97);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }
    
    .win-overlay.show {
      display: flex;
    }
    
    .win-emoji {
      font-size: 52px;
      margin-bottom: 14px;
    }
    
    .win-title {
      font-family: "Roboto Slab", serif;
      font-size: 28px;
      font-weight: 700;
      color: #1a1410;
      margin-bottom: 8px;
    }
    
    .win-sub {
      font-size: 14px;
      color: #7a6e65;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 22px;
    }
    
    .win-play-again {
      padding: 12px 28px;
      border: none;
      border-radius: 24px;
      background: #333;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .wide {
      /* min-width: 60px; */
      /* min-width: 78px; */
      flex: 1.5;
      min-width: 52px;
    }

  </style>
</head>

<body>

<header>
  <button class="back-btn" onclick="location.href='index.html'">&lt;</button>
  <span class="brand">Wordle</span>
  <span></span>
</header>

<div class="subheader">
  <div class="clue">Guess the word</div>
</div>  
  
<div id="board"></div>

<p id="status"></p>
<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-emoji">💛</div>
  <div class="win-title">You got it!</div>
  <div class="win-sub"> Nice one. Clean solve 💫 </div>

  <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">

    <button class="win-play-again" onclick="admireMode()">Admire Puzzle</button>
    <button class="win-play-again" onclick="resetGame()">Play Again</button>
    <button class="win-play-again" onclick="location.href='index.html'">Home</button>

  </div>

</div>

  
<!-- KEYBOARD -->
<div class="keyboard">

  <!-- ROW 1 -->
  <div class="keyrow" id="row1"></div>

  <!-- ROW 2 -->
  <div class="keyrow" id="row2"></div>

  <!-- ROW 3 -->
  <div class="keyrow" id="row3"></div>

</div>

<script>

const ANSWER = "LOVEY";
let current = "";
let tries = 0;

const keyState = {};

const keys = [
  "QWERTYUIOP",
  "ASDFGHJKL",
  "ZXCVBNM"
];

// build keyboard rows
keys.forEach((row, i) => {
  let container = document.getElementById("row" + (i+1));

  row.split("").forEach(k => {
    let key = document.createElement("button");
    key.innerText = k;
    key.className = "key";
    key.id = "key-" + k;

    key.onclick = () => handleKey(k);
    container.appendChild(key);
  });
});

// ADD ENTER (left of Z row)
let row3 = document.getElementById("row3");

let enter = document.createElement("button");
enter.innerText = "ENTER";
enter.className = "key wide";
enter.onclick = submitGuess;

row3.insertBefore(enter, row3.firstChild);

// ADD ERASE (right of Z row)
let erase = document.createElement("button");
erase.innerText = "⌫";
erase.className = "key wide";
erase.onclick = backspace;

row3.appendChild(erase);

// create board
for (let i = 0; i < 5; i++) {
  let row = document.createElement("div");
  row.className = "row";

  for (let j = 0; j < 5; j++) {
    let tile = document.createElement("div");
    tile.className = "tile";
    row.appendChild(tile);
  }

  document.getElementById("board").appendChild(row);
}

function handleKey(k) {
  if (admire) return;
  if (tries >= 5) return;

  if (current.length < 5) {
    current += k;
  }

  updateTiles();
}

function backspace() {
  if (admire) return;
  if (current.length > 0) {
    current = current.slice(0, -1);
    updateTiles();
  }
}

function updateTiles() {
  let row = document.getElementsByClassName("row")[tries];
  let tiles = row.children;

  for (let i = 0; i < 5; i++) {
    tiles[i].innerText = current[i] || "";
  }
}

function submitGuess() {
  if (admire) return;
  if (current.length !== 5 || tries >= 5) return;

  let row = document.getElementsByClassName("row")[tries];
  let tiles = row.children;

  for (let i = 0; i < 5; i++) {
    let letter = current[i];

    if (letter === ANSWER[i]) {
      tiles[i].style.background = "#387f31";
      tiles[i].style.color = "white";
      updateKey(letter, "#387f31");
    } 
    else if (ANSWER.includes(letter)) {
      tiles[i].style.background = "#c9b458";
      tiles[i].style.color = "white";
      updateKey(letter, "#c9b458");
    } 
    else {
      tiles[i].style.background = "#787c7e";
      tiles[i].style.color = "white";
      updateKey(letter, "#787c7e");
    }
  }

  if (current === ANSWER) {
    document.getElementById("status").innerText = "You got it 💛";
    document.getElementById("winOverlay").classList.add("show");
  }

  tries++;
  current = "";
}

function updateKey(letter, color) {
  const priority = {
    "#387f31": 3,
    "#c9b458": 2,
    "#787c7e": 1
  };

  if (!keyState[letter] || priority[color] > priority[keyState[letter]]) {
    keyState[letter] = color;
    document.getElementById("key-" + letter).style.background = color;
    document.getElementById("key-" + letter).style.color = "white";
  }
}

function resetGame() {
  current = "";
  tries = 0;
  admire = false;

  document.getElementById("status").innerText = "";
  document.getElementById("winOverlay").classList.remove("show");

  document.querySelectorAll(".key").forEach(k => {
    k.style.pointerEvents = "auto";
    k.style.opacity = "1";
    k.style.background = "#ddd";
    k.style.color = "#111";
  });

  document.getElementById("board").innerHTML = "";

  // rebuild board
  for (let i = 0; i < 5; i++) {
    let row = document.createElement("div");
    row.className = "row";

    for (let j = 0; j < 5; j++) {
      let tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
    }

    document.getElementById("board").appendChild(row);
  }
}
  
let admire = false;

function admireMode() {
  admire = true;
  document.getElementById("winOverlay").classList.remove("show");

  // disable keyboard interaction
  document.querySelectorAll(".key").forEach(k => {
    k.style.pointerEvents = "none";
    k.style.opacity = "0.5";
  });

  document.getElementById("status").innerText = "Admiring puzzle ✨";
}


</script>

</body>
</html>
