<!DOCTYPE html>
<html>
<head>
  <title>Wordle</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">

  <style>

    body {
      font-family:
        "Franklin Gothic Medium",
        "Franklin Gothic",
        sans-serif;

      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;

      -webkit-tap-highlight-color: transparent;
    }

    /* TITLE (same style as Baba Times) */
    h2 {
      font-family: "Roboto Slab", serif;
      font-weight: 700;
      font-size: clamp(28px, 6vw, 38px);
      margin-bottom: 10px;
    }

    .home {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);

      padding: 10px 16px;
      border: 2px solid #333;
      border-radius: 20px;
      background: white;
      color: #333;

      font-size: 13px;
      font-weight: bold;

      cursor: pointer;
    }

    #board {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .tile {
      width: clamp(36px, 9vw, 45px);
      height: clamp(36px, 9vw, 45px);

      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;

      font-weight: bold;
      font-size: clamp(16px, 4.5vw, 20px);

      color: #111;
      background: white;
    }

    /* KEYBOARD */
    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .keyrow {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      padding: 10px;
      min-width: 30px;

      border: none;
      background: #ddd;
      cursor: pointer;
      border-radius: 4px;

      font-weight: bold;
      -webkit-tap-highlight-color: transparent;
    }

    .wide {
      min-width: 60px;
    }

  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">&lt;</button>

<h2>Wordle</h2>

<div id="board"></div>

<p id="status"></p>

<div class="keyboard">
  <div class="keyrow" id="row1"></div>
  <div class="keyrow" id="row2"></div>

  <!-- bottom row with ENTER + ZXC... + ERASE -->
  <div class="keyrow" id="row3"></div>
</div>

<script>

const ANSWER = "LOVEY";
let current = "";
let tries = 0;

const keyState = {};

const keys = [
  "QWERTYUIOP",
  "ASDFGHJKL",
  "ZXCVBNM"
];

// build keyboard
keys.forEach((row, i) => {
  let container = document.getElementById("row" + (i+1));

  row.split("").forEach(k => {
    let key = document.createElement("button");
    key.innerText = k;
    key.className = "key";
    key.id = "key-" + k;
    key.onclick = () => handleKey(k);
    container.appendChild(key);
  });
});

/* ENTER + ERASE */
const row3 = document.getElementById("row3");

const enterKey = document.createElement("button");
enterKey.innerText = "ENTER";
enterKey.className = "key wide";
enterKey.onclick = submitGuess;
row3.appendChild(enterKey);

"ZXCVBNM".split("").forEach(k => {
  let key = document.createElement("button");
  key.innerText = k;
  key.className = "key";
  key.id = "key-" + k;
  key.onclick = () => handleKey(k);
  row3.appendChild(key);
});

const eraseKey = document.createElement("button");
eraseKey.innerText = "⌫";
eraseKey.className = "key wide";
eraseKey.onclick = eraseLetter;
row3.appendChild(eraseKey);

/* BOARD */
for (let i = 0; i < 5; i++) {
  let row = document.createElement("div");
  row.className = "row";

  for (let j = 0; j < 5; j++) {
    let tile = document.createElement("div");
    tile.className = "tile";
    row.appendChild(tile);
  }

  document.getElementById("board").appendChild(row);
}

/* FUNCTIONS */

function handleKey(k) {
  if (tries >= 5) return;

  if (current.length < 5) {
    current += k;
  }

  updateTiles();
}

function eraseLetter() {
  current = current.slice(0, -1);
  updateTiles();
}

function updateTiles() {
  let row = document.getElementsByClassName("row")[tries];
  let tiles = row.children;

  for (let i = 0; i < 5; i++) {
    tiles[i].innerText = current[i] || "";
  }
}

function submitGuess() {
  if (current.length !== 5 || tries >= 5) return;

  let row = document.getElementsByClassName("row")[tries];
  let tiles = row.children;

  for (let i = 0; i < 5; i++) {
    let letter = current[i];

    if (letter === ANSWER[i]) {
      tiles[i].style.background = "#387f31";
      tiles[i].style.color = "white";
      updateKey(letter, "#387f31");
    } 
    else if (ANSWER.includes(letter)) {
      tiles[i].style.background = "#c9b458";
      tiles[i].style.color = "white";
      updateKey(letter, "#c9b458");
    } 
    else {
      tiles[i].style.background = "#787c7e";
      tiles[i].style.color = "white";
      updateKey(letter, "#787c7e");
    }
  }

  if (current === ANSWER) {
    document.getElementById("status").innerText = "You got it 💛";
  }

  tries++;
  current = "";
}

function updateKey(letter, color) {
  const priority = {
    "#387f31": 3,
    "#c9b458": 2,
    "#787c7e": 1
  };

  if (!keyState[letter] || priority[color] > priority[keyState[letter]]) {
    keyState[letter] = color;
    document.getElementById("key-" + letter).style.background = color;
    document.getElementById("key-" + letter).style.color = "white";
  }
}

</script>

</body>
</html>
