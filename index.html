<!DOCTYPE html>
<html>

<head>
  <title>Baba Times</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fafafa;
      padding: 20px;
      box-sizing: border-box;

       -webkit-tap-highlight-color: transparent;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        position: fixed;
        width: 100%;
    }

    .menu {
      width: min(460px, 92vw);
    }

    h1 {
      text-align: center;
      margin-bottom: 28px;
      font-family: "Roboto Slab", serif;
      /* font-size: clamp(36px, 9vw, 56px); */
    }

    h2 {
    text-align: center;  
    font-size: clamp(11px, 3vw, 13px);
    font-family:
        "Franklin Gothic Medium",
        "Franklin Gothic",
        sans-serif;
      
    }
    
    .game-btn {
      width: 100%;
      border: none;
      border-radius: 24px;
      padding: 30px 24px;
      margin-bottom: 16px;
      cursor: pointer;
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      box-sizing: border-box;
      transition:
        transform 0.15s,
        opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .game-btn:hover {
      opacity: 0.94;
    }

    .game-btn:active {
      transform: scale(0.985);
    }

    .wordle {
      background: #d3d6db;
    }

    .connections {
      background: #b0a7f8;
    }

    .strands {
      background: #b1ded7;
    }

    .game-title {
        font-family: "Roboto Slab", serif;
        font-size: clamp(26px, 6vw, 34px);
        font-weight: 700;
        color: #111;
        margin-top: 0.5px;
        margin-bottom: 4px;
      }

    .game-desc {
      font-family:
        "Franklin Gothic Medium",
        "Franklin Gothic",
        sans-serif;
      font-size: clamp(10px, 2vw, 11px);
       font-weight: normal;
      color: #545353;
      margin-bottom: 25px;
      line-height: 1.35;
      -webkit-tap-highlight-color: transparent;
    }
    
    .game-date {
        font-family: "Roboto Slab", serif;
        font-size: clamp(18px, 3vw, 20px);
        font-weight: bold;
        font-weight: 700;
        color: #111;
        margin-bottom: 2px
      }
/* 
    .game-editor {
      font-family: 
        "Franklin Gothic Medium",
        "Franklin Gothic",
        sans-serif;
      font-size: clamp(10px, 2.2vw, 11px);
      color: #999;
      font-weight: normal;
      margin-left: auto;
      text-align: right; 

    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    } */
  </style>
</head>

<body>

  <div class="menu">

    <h1>Baba Times</h1>
    <h2>Season 1 Edition </h2>
    <h2>Happy Anniversary, Baba! I love you 💗</h2>
    
    <button
      class="game-btn wordle"
      onclick="location.href='wordle.html'">

      <div class="game-title">Wordle</div>

      <div class="game-desc">
        Some words are easier to guess than explain how much I love you.
      </div>

      <div class="game-date">
        May 29, 2026
      </div>
      
      <!-- <div class="meta-row">
        <div class="game-date">
          May 29, 2026
        </div>
      
        <div class="game-editor">
          Edited by Jasmine Chua
        </div>
      </div> -->

    </button>

    <button
      class="game-btn connections"
      onclick="location.href='connections.html'">

      <div class="game-title">Connections</div>

      <div class="game-desc">
        Some connections are obvious once you stop pretending not to see them.
      </div>

      <div class="game-date">
        May 29, 2026
      </div>
      
      <!-- <div class="meta-row">
        <div class="game-date">
          May 29, 2026
        </div>
      
        <div class="game-editor">
          Edited by Jasmine Chua
        </div>
      </div> -->
    </button>

    <button
      class="game-btn strands"
      onclick="location.href='strands.html'">

      <div class="game-title">Strands</div>

      <div class="game-desc">
        Not the straightest path, but definitely my favorite one.
      </div>

      <div class="game-date">
        May 29, 2026
      </div>
      
      <!-- <div class="meta-row">
        <div class="game-date">
          May 29, 2026
        </div>
      
        <div class="game-editor">
          Edited by Jasmine Chua
        </div>
      </div> -->
  </div>

</body>
</html>
